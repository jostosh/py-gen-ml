syntax = "proto3";
package pgml;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FileOptions {
	optional bool enable = 1091;
}

// Arg is a single argument to a CLI. These are added explicitly to a message
// using the `cli` field.
message Arg {
	// Name of the argument. This is the name of the argument as it appears on the CLI.
    string name = 1;
	// Path is the dotted path to the argument from the root of the message
	// that enables the CLI extension.
    string path = 2;
}

// CLI enables the CLI extension for a message. This is used to add arguments
// to a CLI. Arguments are added explicitly or implicitly.
message CLI {
	// Explicitly added arguments.
    repeated Arg arg = 1;
	// If true, the CLI extension will be enabled for this message. The extension will
	// cause a CLI Pydantic model and parser to be generated for the message.
	bool enable = 2;
}

// LanceDB opts a message (and its nested message types) into LanceModel codegen.
message LanceDB {
	// If true, emit a ``lancedb.pydantic.LanceModel`` for this message and for
	// every nested message type reachable from it.
	bool enable = 1;
	// Optional table name hint for docs / helpers. Defaults to the message name
	// in snake_case when empty.
	string table_name = 2;
}

// Per-field LanceDB annotations (e.g. fixed-size vector columns).
message LanceDBField {
	// When set to a positive value, the field is emitted as ``Vector(dim)``
	// instead of a scalar or list type. Typically applied to ``repeated float``.
	uint32 vector_dim = 1;
}

// Canonical role of a message in the ML lifecycle. Tool-specific options
// (e.g. lancedb, cli) remain separate; kind is shared vocabulary for generators.
enum MessageKind {
	MESSAGE_KIND_UNSPECIFIED = 0;
	FEATURE_ROW = 1;
	LABEL = 2;
	PREDICTION = 3;
	FEEDBACK = 4;
	RUN_CONFIG = 5;
	METRIC_SET = 6;
}

// BentoML opts a protobuf service into service/client/config codegen.
message BentoML {
	// If true, emit BentoML I/O models, create_*_service factory, and client helpers.
	bool enable = 1;
	// Optional Python class name for the generated service. Defaults to the proto service name.
	string name = 2;
}

// Per-RPC BentoML annotations (route, API name, batching).
message BentoMLMethod {
	// HTTP route, e.g. "/predict". Defaults to "/{method_snake_name}".
	string route = 1;
	// API endpoint name exposed to clients. Defaults to the method snake_case name.
	string name = 2;
	// When true, mark the API as batchable.
	bool batchable = 3;
}

// Links a RUN_CONFIG (or other) message to a BentoML service for serve kwargs / client URL.
message BentoMLConfig {
	bool enable = 1;
	// Proto service name this config configures (must match the service declaration name).
	string service = 2;
}

extend google.protobuf.MessageOptions {
	// Python import path for a class to instantiate using the values
	// of this message.
	string factory = 1091;
    // Map of argument names to paths. The path is the dotted path to the argument
    // from the root of the CLI args class.
    CLI cli = 1092;
	// Opt into LanceDB LanceModel generation for this message + nested types.
	LanceDB lancedb = 1093;
	// Canonical ML-contract kind for this message (see MessageKind).
	optional MessageKind kind = 1094;
	// Opt into BentoML serve-config helpers for this message.
	BentoMLConfig bentoml_config = 1095;
}

extend google.protobuf.ServiceOptions {
	BentoML bentoml = 1091;
}

extend google.protobuf.MethodOptions {
	BentoMLMethod bentoml_method = 1091;
}

// Defaults values applied at the field level
extend google.protobuf.FieldOptions {
	// Value specify the default value to set on this field. By default,
	// none is set on a field.
	optional FieldDefaults default = 1171;
	// If true, and builder is set, the field will be treated as a varargs field.
	bool as_varargs = 1172;
	// LanceDB-specific field annotations (vector dimensions, etc.).
	LanceDBField lancedb_field = 1173;
}

// FieldDefaults encapsulates the default values for each type of field. Depending on the
// field, the correct set should be used to ensure proper defaults generation.
message FieldDefaults {
	oneof type {
		// Scalar Field Types
		float float = 1;
		double double = 2;
		int32 int32 = 3;
		int64 int64 = 4;
		uint32 uint32 = 5;
		uint64 uint64 = 6;
		sint32 sint32 = 7;
		sint64 sint64 = 8;
		fixed32 fixed32 = 9;
		fixed64 fixed64 = 10;
		sfixed32 sfixed32 = 11;
		sfixed64 sfixed64 = 12;
		bool bool = 13;
		string string = 14;
		bytes bytes = 15;
		string enum = 16;
	}
	reserved 18 to 20;
}
