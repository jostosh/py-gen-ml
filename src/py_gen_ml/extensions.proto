syntax = "proto3";
package pgml;

import "google/protobuf/descriptor.proto";

extend google.protobuf.FileOptions {
	optional bool enable = 1091;
}

// Arg is a single argument to a CLI. These are added explicitly to a message
// using the `cli` field.
message Arg {
	// Name of the argument. This is the name of the argument as it appears on the CLI.
    string name = 1;
	// Path is the dotted path to the argument from the root of the message
	// that enables the CLI extension.
    string path = 2;
}

// CLI enables the CLI extension for a message. This is used to add arguments
// to a CLI. Arguments are added explicitly or implicitly.
message CLI {
	// Explicitly added arguments.
    repeated Arg arg = 1;
	// If true, the CLI extension will be enabled for this message. The extension will
	// cause a CLI Pydantic model and parser to be generated for the message.
	bool enable = 2;
}

// LanceDB opts a message (and its nested message types) into LanceModel codegen.
message LanceDB {
	// If true, emit a ``lancedb.pydantic.LanceModel`` for this message and for
	// every nested message type reachable from it.
	bool enable = 1;
	// Optional table name hint for docs / helpers. Defaults to the message name
	// in snake_case when empty.
	string table_name = 2;
}

// Per-field LanceDB annotations (e.g. fixed-size vector columns).
message LanceDBField {
	// When set to a positive value, the field is emitted as ``Vector(dim)``
	// instead of a scalar or list type. Typically applied to ``repeated float``.
	uint32 vector_dim = 1;
	// When true, this field is part of the join key for ``table.merge_insert(on=...)``.
	bool merge_key = 2;
}

// Canonical role of a message in the ML lifecycle. Tool-specific options
// (e.g. lancedb, cli) remain separate; kind is shared vocabulary for generators.
enum MessageKind {
	MESSAGE_KIND_UNSPECIFIED = 0;
	FEATURE_ROW = 1;
	LABEL = 2;
	PREDICTION = 3;
	FEEDBACK = 4;
	RUN_CONFIG = 5;
	METRIC_SET = 6;
}

// BentoML opts a protobuf service into service/client/config codegen.
message BentoML {
	// If true, emit BentoML I/O models, create_*_service factory, and client helpers.
	bool enable = 1;
	// Optional Python class name for the generated service. Defaults to the proto service name.
	string name = 2;
}

// Per-RPC BentoML annotations (route, API name, batching).
message BentoMLMethod {
	// HTTP route, e.g. "/predict". Defaults to "/{method_snake_name}".
	string route = 1;
	// API endpoint name exposed to clients. Defaults to the method snake_case name.
	string name = 2;
	// When true, mark the API as batchable.
	bool batchable = 3;
}

// Links a RUN_CONFIG (or other) message to a BentoML service for serve kwargs / client URL.
message BentoMLConfig {
	bool enable = 1;
	// Proto service name this config configures (must match the service declaration name).
	string service = 2;
}

// LitServe opts a protobuf service into LitAPI / LitServer codegen.
message LitServe {
	// If true, emit LitServe I/O models, create_*_server factory, and client helpers.
	bool enable = 1;
	// Optional Python class name prefix for generated LitAPI classes. Defaults to the proto service name.
	string name = 2;
}

// Per-RPC LitServe annotations (API path).
message LitServeMethod {
	// HTTP endpoint path, e.g. "/predict". Defaults to "/{method_snake_name}".
	string api_path = 1;
}

// Links a RUN_CONFIG (or other) message to a LitServe service for LitServer kwargs / client URL.
message LitServeConfig {
	bool enable = 1;
	// Proto service name this config configures (must match the service declaration name).
	string service = 2;
}

// PydanticAI opts a message into structured synthesis helpers (NativeOutput).
message PydanticAI {
	bool enable = 1;
	// Optional Agent name hint. Defaults to the message name.
	string agent_name = 2;
	// Optional proto message name for the response/output model when different from this message.
	string response_message = 3;
}

// Role of a field on an Argilla-enabled record message.
enum ArgillaSlot {
	ARGILLA_SLOT_UNSPECIFIED = 0;
	FIELD = 1;
	QUESTION = 2;
	METADATA = 3;
}

// Opt a message into Argilla Settings / record codegen.
message Argilla {
	bool enable = 1;
	string dataset_name = 2;
}

// Per-field Argilla annotations (Field vs Question vs Metadata).
message ArgillaField {
	ArgillaSlot slot = 1;
	// Optional UI / API name; default = proto field name.
	string name = 2;
	// When slot = FIELD: text | chat | image | ...
	string field_type = 3;
	// When slot = QUESTION: label | multi_label | rating | text | ranking | ...
	string question_type = 4;
	repeated string labels = 5;
	bool required = 6;
}

// Opt into cross-tool mapper helpers for this message.
message MapperConfig {
	bool enable = 1;
}

// Shared rename for generated mappers when tool column names diverge.
message MapperField {
	string alias = 1;
}

// Role of a field when logging RUN_CONFIG / METRIC_SET messages to experiment trackers.
enum TrackingSlot {
	TRACKING_SLOT_UNSPECIFIED = 0;
	PARAM = 1;
	METRIC = 2;
	TAG = 3;
}

// Per-field experiment-tracking annotations (param / metric / tag).
message TrackingField {
	TrackingSlot slot = 1;
	// Optional log key; default = proto field name or dotted path when nested.
	string name = 2;
}

// Opt a message into MLflow run / param / metric helpers.
message MLflow {
	bool enable = 1;
	// Optional default experiment name for start_*_run helpers.
	string experiment_name = 2;
	// Optional field name on a RUN_CONFIG used as the MLflow run name.
	string run_name_field = 3;
}

// Opt a message into Weights & Biases init / config / metric helpers.
message Wandb {
	bool enable = 1;
	// Optional default W&B project for init_*_run helpers.
	string project = 2;
	// Optional field name on a RUN_CONFIG used as the W&B run name.
	string run_name_field = 3;
}

extend google.protobuf.MessageOptions {
	// Python import path for a class to instantiate using the values
	// of this message.
	string factory = 1091;
    // Map of argument names to paths. The path is the dotted path to the argument
    // from the root of the CLI args class.
    CLI cli = 1092;
	// Opt into LanceDB LanceModel generation for this message + nested types.
	LanceDB lancedb = 1093;
	// Canonical ML-contract kind for this message (see MessageKind).
	optional MessageKind kind = 1094;
	// Opt into BentoML serve-config helpers for this message.
	BentoMLConfig bentoml_config = 1095;
	// Opt into LitServe serve-config helpers for this message.
	LitServeConfig litserve_config = 1096;
	// Opt into PydanticAI synthesis helpers for this message.
	PydanticAI pydantic_ai = 1097;
	// Opt into Argilla Settings / record helpers for this message.
	Argilla argilla = 1098;
	// Opt into cross-tool mapper helpers for this message.
	MapperConfig mapper_config = 1099;
	// Opt into MLflow tracking helpers for this message.
	MLflow mlflow = 1100;
	// Opt into Weights & Biases tracking helpers for this message.
	Wandb wandb = 1101;
}

extend google.protobuf.ServiceOptions {
	BentoML bentoml = 1091;
	LitServe litserve = 1092;
}

extend google.protobuf.MethodOptions {
	BentoMLMethod bentoml_method = 1091;
	LitServeMethod litserve_method = 1092;
}

// Defaults values applied at the field level
extend google.protobuf.FieldOptions {
	// Value specify the default value to set on this field. By default,
	// none is set on a field.
	optional FieldDefaults default = 1171;
	// If true, and builder is set, the field will be treated as a varargs field.
	bool as_varargs = 1172;
	// LanceDB-specific field annotations (vector dimensions, etc.).
	LanceDBField lancedb_field = 1173;
	// Argilla Field / Question / Metadata slot for this field.
	ArgillaField argilla_field = 1175;
	// Cross-tool column/field rename for generated mappers.
	MapperField mapper_field = 1176;
	// Experiment-tracking param / metric / tag slot for this field.
	TrackingField tracking_field = 1177;
}

// FieldDefaults encapsulates the default values for each type of field. Depending on the
// field, the correct set should be used to ensure proper defaults generation.
message FieldDefaults {
	oneof type {
		// Scalar Field Types
		float float = 1;
		double double = 2;
		int32 int32 = 3;
		int64 int64 = 4;
		uint32 uint32 = 5;
		uint64 uint64 = 6;
		sint32 sint32 = 7;
		sint64 sint64 = 8;
		fixed32 fixed32 = 9;
		fixed64 fixed64 = 10;
		sfixed32 sfixed32 = 11;
		sfixed64 sfixed64 = 12;
		bool bool = 13;
		string string = 14;
		bytes bytes = 15;
		string enum = 16;
	}
	reserved 18 to 20;
}
