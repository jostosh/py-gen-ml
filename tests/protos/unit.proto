syntax = "proto3";

package py_gen_ml.test;

import "py_gen_ml/extensions.proto";

message Int32Test {
    int32 value = 1;
}

message Int64Test {
    int64 value = 1;
}

message Uint32Test {
    uint32 value = 1;
}

message Uint64Test {
    uint64 value = 1;
}

message Sint32Test {
    sint32 value = 1;
}

message Sint64Test {
    sint64 value = 1;
}

message Fixed32Test {
    fixed32 value = 1;
}

message Fixed64Test {
    fixed64 value = 1;
}

message Sfixed32Test {
    sfixed32 value = 1;
}

message Sfixed64Test {
    sfixed64 value = 1;
}

message BoolTest {
    bool value = 1;
}

message FloatTest {
    float value = 1;
}

message DoubleTest {
    double value = 1;
}

message StringTest {
    string value = 1;
}

message BytesTest {
    bytes value = 1;
}

enum Enum {
    VALUE_1 = 0;
    VALUE_2 = 1;
    VALUE_3 = 2;
}

message EnumTest {
    Enum value = 1;
}

message OneofTest {
    oneof value {
        int32 int_value = 1;
        string string_value = 2;
    }
}

message RepeatedTest {
    repeated int32 values = 1;
}

message OptionalTest {
    optional int32 value = 1;
}

message Int32DefaultTest {
    int32 value = 1 [(pgml.default).int32 = 1];
}

message Int64DefaultTest {
    int64 value = 1 [(pgml.default).int64 = 1];
}

message Uint32DefaultTest {
    uint32 value = 1 [(pgml.default).uint32 = 1];
}

message Uint64DefaultTest {
    uint64 value = 1 [(pgml.default).uint64 = 1];
}

message Sint32DefaultTest {
    sint32 value = 1 [(pgml.default).sint32 = 1];
}

message Sint64DefaultTest {
    sint64 value = 1 [(pgml.default).sint64 = 1];
}

message Fixed32DefaultTest {
    fixed32 value = 1 [(pgml.default).fixed32 = 1];
}

message Fixed64DefaultTest {
    fixed64 value = 1 [(pgml.default).fixed64 = 1];
}

message Sfixed32DefaultTest {
    sfixed32 value = 1 [(pgml.default).sfixed32 = 1];
}

message Sfixed64DefaultTest {
    sfixed64 value = 1 [(pgml.default).sfixed64 = 1];
}

message BoolDefaultTest {
    bool value = 1 [(pgml.default).bool = true];
}

message FloatDefaultTest {
    float value = 1 [(pgml.default).float = 1];
}

message DoubleDefaultTest {
    double value = 1 [(pgml.default).double = 1];
}

message StringDefaultTest {
    string value = 1 [(pgml.default).string = "test"];
}

message BytesDefaultTest {
    bytes value = 1 [(pgml.default).bytes = "test"];
}

message EnumDefaultTest {
    Enum value = 1 [(pgml.default).enum = "VALUE_1"];
}

message OneofDefaultTest {
    oneof value {
        int32 int_value = 1 [(pgml.default).int32 = 1];
        string string_value = 2 [(pgml.default).string = "test"];
    }
}

message OptionalDefaultTest {
    optional int32 value = 1 [(pgml.default).int32 = 1];
}

message ExplicitCLIArgTest {
    option (pgml.cli) = {
        enable: true;
        arg {
            name: "foo"
            path: "bar"
        }
    };
    string bar = 1;
}

message ImplicitCLIArgTest {
    option (pgml.cli).enable = true;
    string bar = 1;
}

message NestedFooTest {
    string foo = 1;
}

message NestedBarTest {
    NestedFooTest foo_0 = 1;
    NestedFooTest foo_1 = 2;
}

message RepeatedNestedBarTest {
    repeated NestedBarTest bar = 1;
}

message LanceDBNestedMeta {
    string label = 1;
}

message LanceDBRecordTest {
    option (pgml.kind) = FEATURE_ROW;
    option (pgml.lancedb) = {
        enable: true;
        table_name: "lance_records";
    };
    string id = 1;
    repeated float embedding = 2 [(pgml.lancedb_field).vector_dim = 4];
    LanceDBNestedMeta meta = 3;
}

message PredictRequestTest {
    option (pgml.kind) = FEATURE_ROW;
    repeated float features = 1;
}

message PredictResponseTest {
    option (pgml.kind) = PREDICTION;
    int32 label = 1;
    float score = 2;
}

message ClassifierServeConfigTest {
    option (pgml.kind) = RUN_CONFIG;
    option (pgml.bentoml_config) = {
        enable: true;
        service: "ClassifierTest";
    };
    option (pgml.litserve_config) = {
        enable: true;
        service: "ClassifierTest";
    };
    string url = 1 [(pgml.default) = {string: "http://localhost:3000"}];
    int32 workers = 2 [(pgml.default) = {int32: 1}];
    float timeout_s = 3 [(pgml.default) = {float: 60}];
    int32 workers_per_device = 4 [(pgml.default) = {int32: 1}];
    string accelerator = 5 [(pgml.default) = {string: "auto"}];
}

service ClassifierTest {
    option (pgml.bentoml) = {
        enable: true;
    };
    option (pgml.litserve) = {
        enable: true;
    };
    rpc Predict(PredictRequestTest) returns (PredictResponseTest) {
        option (pgml.bentoml_method) = {
            route: "/predict";
        };
        option (pgml.litserve_method) = {
            api_path: "/predict";
        };
    }
}

// Synthesis example for PydanticAI + Argilla flywheel tests.
message ReviewExampleTest {
    option (pgml.kind) = FEATURE_ROW;
    option (pgml.pydantic_ai) = {
        enable: true;
    };
    option (pgml.argilla) = {
        enable: true;
        dataset_name: "review_examples";
    };
    option (pgml.mapper_config) = {
        enable: true;
    };
    // Stable identifier for the example (not shown as a primary Argilla field).
    string id = 1 [(pgml.argilla_field) = {
        slot: METADATA;
    }];
    // User-facing instruction or prompt to answer.
    string instruction = 2 [(pgml.argilla_field) = {
        slot: FIELD;
        field_type: "text";
        required: true;
    }];
    // Model or human-written response to the instruction.
    string generation = 3 [(pgml.argilla_field) = {
        slot: FIELD;
        field_type: "text";
        required: true;
    }];
    // Annotator quality label for the generation.
    string quality = 4 [(pgml.argilla_field) = {
        slot: QUESTION;
        question_type: "label";
        labels: ["bad", "good"];
        required: true;
    }];
}

// Nested optimizer knobs for tracking flatten tests.
message OptimizerConfigTest {
    float learning_rate = 1;
    float weight_decay = 2;
}

// RUN_CONFIG for MLflow / W&B param + tag helpers.
message RunConfigTest {
    option (pgml.kind) = RUN_CONFIG;
    option (pgml.mlflow) = {
        enable: true;
        experiment_name: "unit";
        run_name_field: "run_name";
    };
    option (pgml.wandb) = {
        enable: true;
        project: "unit";
        run_name_field: "run_name";
    };
    // Human-readable run name (logged as a tag).
    string run_name = 1 [(pgml.tracking_field) = {
        slot: TAG;
    }];
    int32 epochs = 2;
    OptimizerConfigTest optimizer = 3;
}

// METRIC_SET for MLflow / W&B metric helpers.
message MetricSetTest {
    option (pgml.kind) = METRIC_SET;
    option (pgml.mlflow) = {
        enable: true;
    };
    option (pgml.wandb) = {
        enable: true;
    };
    float accuracy = 1;
    float loss = 2;
}
